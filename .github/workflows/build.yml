name: Build Flutter APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Ensure android folder is clean
        run: |
          rm -rf android
          flutter create . --platforms=android --org com.example --project-name haway_app

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Add Firebase Gradle plugin
        run: |
          echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
          sed -i "s/id 'dev.flutter.flutter-plugin-loader' version '1.0.0'/id 'dev.flutter.flutter-plugin-loader' version '1.0.0'\n    id 'com.google.gms.google-services' version '4.4.0' apply false/" android/settings.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
